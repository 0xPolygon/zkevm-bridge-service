on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'  # GitHub uses glob patterns, not regex
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write  # needed to push to GHCR with GITHUB_TOKEN

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize GHCR image name (lowercase owner)
        # e.g., ghcr.io/0xpolygon/zkevm-bridge-service
        run: |
          GHCR_OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "GHCR_IMAGE_NAME=ghcr.io/${GHCR_OWNER_LC}/zkevm-bridge-service" >> $GITHUB_ENV

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.GHCR_IMAGE_NAME }}:${{ github.ref_name }}
          build-args: |
            PRIVATE_TOKEN=${{ secrets.GIT_TOKEN }}
